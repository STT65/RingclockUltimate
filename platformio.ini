[platformio]
default_envs = d1_mini

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

; --- Optimierungen ---
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DASYNCWEBSERVER_REGEX
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    ;-DDEBUG_ESP_PORT=Serial
    ;-DDEBUG_ESP_CORE
    ;-DDEBUG_ESP_WIFI
    ;-DDEBUG_ESP_HTTP_SERVER

; --- LittleFS ---
board_build.filesystem = littlefs

; --- Libraries ---
lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/ESPAsyncTCP.git
    bblanchon/ArduinoJson @ ^6.21.3
    makuna/NeoPixelBus @ ^2.7.0
    claws/BH1750 @ ^1.3.0
    ESP8266WiFi
    ESP8266mDNS
    knolleary/PubSubClient @ ^2.8

; --- Upload ---
upload_speed = 921600
monitor_speed = 115200

; --- OTA optional ---
; upload_protocol = espota
; upload_port = 192.168.x.x

; ============================================================
; Release environment
; Identical to d1_mini but processes data/script.js before
; the filesystem image is built:
;   - removes the hardcoded dev WebSocket URL line
;   - uncomments the location.host line
;
; Usage:
;   pio run -e release --target buildfs
;   pio run -e release --target uploadfs
;   pio run -e release                   (firmware only)
; ============================================================
[env:release]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.filesystem = littlefs
build_flags =
    ${env:d1_mini.build_flags}
lib_deps =
    ${env:d1_mini.lib_deps}
upload_speed = ${env:d1_mini.upload_speed}
monitor_speed = ${env:d1_mini.monitor_speed}
extra_scripts = pre:scripts/release_data.py
